version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/app
    overwrite: yes

permissions:
  - object: /home/ec2-user/app
    pattern: '**'
    owner: ec2-user
    group: ec2-user

hooks:
  ApplicationStop:
    - location: stop_server.sh
      timeout: 60
      runas: ec2-user

  BeforeInstall:
    - location: before_install.sh
      timeout: 120
      runas: ec2-user

  AfterInstall:
    - location: after_install.sh
      timeout: 300
      runas: ec2-user

  ApplicationStart:
    - location: start_server.sh
      timeout: 180
      runas: ec2-user

  ValidateService:
    - location: validate_service.sh
      timeout: 90
      runas: ec2-user