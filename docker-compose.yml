name: chat-resumes

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chat_resumes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "45439:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_resumes"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: node:22-bookworm-slim
    init: true
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 43807
      CLIENT_ORIGIN: http://localhost:43173,https://chatresumes.com
      APP_BASE_URL: http://localhost:43807
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat_resumes?schema=public
      SOCKET_PATH: /socket.io
      CLERK_SECRET_KEY:
      STRIPE_SECRET_KEY:
      STRIPE_WEBHOOK_SECRET:
      OPENAI_API_KEY:
    ports:
      - "43807:43807"
    volumes:
      - .:/app
      - backend-node-modules:/app/node_modules
    command: >
      sh -lc "
      corepack enable &&
      yarn install --frozen-lockfile &&
      yarn workspace chat-resumes-backend prisma:migrate:deploy &&
      yarn workspace chat-resumes-backend prisma:generate &&
      yarn build:backend &&
      yarn workspace chat-resumes-backend start
      "

  web:
    image: node:22-bookworm-slim
    init: true
    working_dir: /app
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:43807
      VITE_CLERK_PUBLISHABLE_KEY:
    ports:
      - "43173:43173"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
    command: >
      sh -lc "
      corepack enable &&
      yarn install --frozen-lockfile &&
      yarn build:web &&
      yarn workspace chat-resumes-web preview --host 0.0.0.0 --port 43173
      "

  backend-dev:
    image: node:22-bookworm-slim
    init: true
    working_dir: /app
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 43808
      CLIENT_ORIGIN: http://localhost:43174
      APP_BASE_URL: http://localhost:43808
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat_resumes?schema=public
      SOCKET_PATH: /socket.io
      CLERK_SECRET_KEY:
      STRIPE_SECRET_KEY:
      STRIPE_WEBHOOK_SECRET:
      OPENAI_API_KEY:
    ports:
      - "43808:43808"
    volumes:
      - .:/app
      - backend-dev-node-modules:/app/node_modules
    command: >
      sh -lc "
      corepack enable &&
      yarn install --frozen-lockfile &&
      yarn workspace chat-resumes-backend prisma:migrate:deploy &&
      yarn workspace chat-resumes-backend prisma:generate &&
      yarn workspace chat-resumes-backend dev
      "

  web-dev:
    image: node:22-bookworm-slim
    init: true
    working_dir: /app
    profiles: ["dev"]
    depends_on:
      - backend-dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:43808
      VITE_CLERK_PUBLISHABLE_KEY:
    ports:
      - "43174:43174"
    volumes:
      - .:/app
      - web-dev-node-modules:/app/node_modules
    command: >
      sh -lc "
      corepack enable &&
      yarn install --frozen-lockfile &&
      yarn workspace chat-resumes-web dev --host 0.0.0.0 --port 43174
      "

volumes:
  postgres-data:
  backend-node-modules:
  web-node-modules:
  backend-dev-node-modules:
  web-dev-node-modules: